pre-commit:
  parallel: true
  commands:
    ktlint:
      run: ./gradlew ktlintAll --stacktrace
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: bash scripts/hooks/run-actionlint.sh
    gitleaks:
      run: bash scripts/hooks/run-gitleaks.sh

pre-push:
  commands:
    quality-and-tests:
      run: ./gradlew detektAll :core:allTests :composeApp:allTests --stacktrace
    android-and-web:
      run: ./gradlew :androidApp:lintDebug :androidApp:assembleDebug --stacktrace
    # ios-simulator:
      # run: bash scripts/hooks/run-ios-verification.sh
